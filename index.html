<!doctype html>
<html>
<head>
	<title>Feeling Lucky?</title>
	<li class="list">https://music.apple.com/us/album/treading-water-single/1690748643</li>

	<li class="list">https://distrokid.com/hyperfollow/crackinthesidewalk/treading-water</li>

	<li class="list">https://youtu.be/gAdikaaVY30</li>

	<li class="list">http://instagram.com/citsband</li>

	<li class="list">https://www.tiktok.com/@citsband</li>

	<script>

		/**
		 * This function gets a random item from an array
		 */
		function getRandomItem(arr) {

		    // Get random index value
		    const randomIndex = Math
		    .floor(Math.random() * arr.length);

		    // Get random item
		    const item = arr[randomIndex];
		return item;
		}

		// Create an array of the above lists
		var lists = document.getElementsByClassName("list");

		// Loop through each element in the list
		for(var i=0; i<lists.length; i++) {

			// Find the text of the current list element, store it in a variable and then clear the element's text.
		    var text = lists[i].textContent;
		    lists[i].textContent = "";

		    // Create the a element and make the textContent of the a element the text of the current list and the href, the current text plus the # sign.
		    var a = document.createElement("a");
		    a.href = "#"+text;
		    a.textContent = text;

		    // Append the a to the current list element
		    lists[i].appendChild(a);
		}
		//const result = getRandomItem(lists);

		// Redirect window to a randomly selected link from the lists
	    window.location.replace(getRandomItem(lists).textContent)

	</script>
	

</html>
