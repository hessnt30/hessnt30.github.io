<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>Server Status</title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div id="header-container">
            <div id="header">
                <h1>Covid Craft Server Status</h1>
            </div>
        </div>
        
        <div id="body-container">
            <div class="container">
                <div class="tophalf">
                    <div id="image">
                        <img src=""  alt="Server Icon" id="server-icon"/>
                    </div>
                    <div id="motd-container">
                        <label id="motd-label" class="text-label">MOTD</label>
                        <div id="motd-message"><span id="motd">Message of the Day</span></div>
                    </div>
                </div>
                    
                
                <div class="break" >
    
                </div>
                <div id="text" id="break2">
                    <label class="text-label">IP Address</label>
                    <div id="server-ip-message"><span id="server-ip">Server IP</span></div>
                    <label class="text-label">Status</label>
                    <div id="server-status-message"><span id="server-status"></span></div>
                    <label class="text-label">Players</label>
                    <div id="players-online"><span id="player-count"></span> Player(s) Online</div>
                    <div class="break"></div>
                    <div id="players">
                        <ul id="player-list">
    
                        </ul>
                    </div>
                </div>
            </div>
        </div>
       
            
        
        
        <script src="https://mcapi.us/scripts/minecraft.min.js"></script>
        
        <script src="index.js" async defer></script>
    </body>
</html>
